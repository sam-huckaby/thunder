name: Preview Smoke

on:
  workflow_dispatch:
    inputs:
      runtime_backend:
        description: Runtime path to validate
        required: true
        default: auto
        type: choice
        options:
          - auto

jobs:
  preview-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: opam install -y wasm_of_ocaml-compiler js_of_ocaml dune
      - name: Run preview smoke
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bash scripts/preview_smoke.sh "${{ inputs.runtime_backend }}"
      - name: Upload preview metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-metadata-${{ inputs.runtime_backend }}
          path: .thunder/preview.json
          if-no-files-found: warn
