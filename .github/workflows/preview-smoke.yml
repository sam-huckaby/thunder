name: Preview Smoke

on:
  workflow_dispatch:

jobs:
  preview-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compile_target:
          - js
          - wasm
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: opam install -y wasm_of_ocaml-compiler js_of_ocaml dune
      - name: Run preview smoke
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bash scripts/preview_smoke.sh "${{ matrix.compile_target }}"
      - name: Upload preview metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-metadata-${{ matrix.compile_target }}
          path: |
            .thunder/preview.json
            .thunder/preview-smoke-${{ matrix.compile_target }}.log
            .thunder/preview-smoke-${{ matrix.compile_target }}.summary
          if-no-files-found: warn
