name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Install Binaryen
        run: |
          set -eux
          BINARYEN_VERSION=version_122
          curl -L "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" -o /tmp/binaryen.tar.gz
          tar -xzf /tmp/binaryen.tar.gz -C /tmp
          echo "/tmp/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"
      - name: Verify wasm tools
        run: |
          set -eux
          which wasm-opt
          which wasm-merge
          wasm-opt --version
          wasm-merge --version
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: opam install -y wasm_of_ocaml-compiler js_of_ocaml
      - run: opam install -y odoc
      - run: bash scripts/check_mli.sh
      - run: dune build
      - run: dune runtest
      - run: dune build @doc
      - run: dune build @worker-build
